<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <title>Create Poll - Election Portal</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .class-tag {
      white-space: nowrap;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header style="display: flex; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-xl);">
      <a href="index.html" class="btn btn-outline btn-icon" title="Back">←</a>
      <h1 style="margin: 0;">Create New Poll</h1>
    </header>

    <form id="create-poll-form" class="glass-panel" autocomplete="off">
      <!-- Post Name -->
      <div class="form-group">
        <label class="form-label" for="postName">
          Post Name <span style="color: var(--danger);">*</span>
        </label>
        <input type="text" id="postName" class="form-input" 
               placeholder="e.g., School Captain, Class Representative"
               required maxlength="100">
      </div>

      <!-- Registration Toggle -->
      <div class="form-group" style="background: var(--bg-tertiary); border-radius: var(--radius-lg); padding: var(--spacing-md);">
        <label class="form-label" style="display: flex; align-items: center; gap: var(--spacing-sm); cursor: pointer;">
          <input type="checkbox" id="registrationToggle" checked onchange="toggleRegistration()" style="width:20px; height:20px;">
          <span>Require student registration (Roll No. + Class)</span>
        </label>
        <span class="form-hint" style="margin-left: 28px;">If disabled, anyone can vote without identification (no double‑vote prevention).</span>
      </div>

      <!-- Allowed Classes -->
      <div id="classes-section">
        <div class="form-group">
          <label class="form-label">
            Allowed Voter Classes <span style="color: var(--danger);">*</span>
          </label>
          <div style="display: flex; gap: var(--spacing-sm); align-items: center;">
            <input type="text" id="newClass" class="form-input" 
                   placeholder="Add class (e.g., 10A)" style="flex:1;">
            <button type="button" class="btn btn-outline" onclick="addClass()" style="white-space: nowrap;">Add</button>
          </div>
          <div id="classes-tags" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: var(--spacing-sm);"></div>
          <input type="hidden" id="allowedClasses" required>
          <span class="form-hint">At least one class is required if registration is enabled.</span>
        </div>
      </div>

      <!-- Candidates Section -->
      <div style="margin: var(--spacing-xl) 0;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h3 style="margin: 0;">Candidates</h3>
          <span class="badge badge-active" id="candidate-count">2/10</span>
        </div>
        <p style="color: var(--text-secondary); font-size: 0.875rem;">
          Minimum 2, maximum 10 candidates
        </p>
      </div>

      <div id="candidates-container"></div>

      <button type="button" id="add-candidate-btn" class="btn btn-outline btn-block" style="margin-bottom: var(--spacing-xl);">
        ➕ Add Candidate
      </button>

      <!-- Password Section -->
      <div style="border-top: 2px solid var(--border-color); padding-top: var(--spacing-xl);">
        <h3>🔐 Security</h3>
        <div class="form-group">
          <label class="form-label" for="masterPassword">
            Master Password <span style="color: var(--danger);">*</span>
          </label>
          <input type="password" id="masterPassword" class="form-input" 
                 placeholder="Create a strong password" required minlength="4">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">
            Confirm Password <span style="color: var(--danger);">*</span>
          </label>
          <input type="password" id="confirmPassword" class="form-input" 
                 placeholder="Re-enter password" required>
          <span class="form-hint" id="password-match" style="display: none;"></span>
        </div>
      </div>

      <!-- Action Buttons -->
      <div style="display: flex; gap: var(--spacing-md); margin-top: var(--spacing-xl);">
        <a href="index.html" class="btn btn-outline" style="flex: 1;">Cancel</a>
        <button type="submit" class="btn btn-primary btn-lg" style="flex: 2;">
          🗳️ Create Poll
        </button>
      </div>
    </form>
  </div>

  <script src="db.js"></script>
  <script src="crypto.js"></script>
  <script src="utils.js"></script>
  <script src="notifications.js"></script>
  <script src="theme.js"></script>
  <script>
    // Wait until DOM is fully ready
    document.addEventListener('DOMContentLoaded', () => {
      let candidateCount = 0;
      let classList = [];
      const MAX_CANDIDATES = 10;
      const MIN_CANDIDATES = 2;

      function toggleRegistration() {
        const checked = document.getElementById('registrationToggle').checked;
        document.getElementById('classes-section').style.display = checked ? 'block' : 'none';
        if (!checked) {
          classList = [];
          renderClassTags();
        }
      }

      function addClass() {
        const input = document.getElementById('newClass');
        const className = input.value.trim();
        if (!className) {
          notifications.warning('Please enter a class name');
          return;
        }
        if (classList.includes(className)) {
          notifications.warning('This class already exists');
          return;
        }
        classList.push(className);
        input.value = '';
        renderClassTags();
        input.focus();
      }

      function removeClass(className) {
        classList = classList.filter(c => c !== className);
        renderClassTags();
      }

      function renderClassTags() {
        const container = document.getElementById('classes-tags');
        container.innerHTML = classList.map(c => `
          <span class="class-tag" style="display: inline-flex; align-items: center; gap: 4px; 
                       background: var(--primary); color: white; padding: 6px 12px; 
                       border-radius: var(--radius-full); font-size: 0.875rem;">
            ${c}
            <button type="button" onclick="removeClass('${c}')" 
                    style="background: none; border: none; color: white; cursor: pointer; padding: 0; font-size:1rem;">
              ✕
            </button>
          </span>
        `).join('');
        document.getElementById('allowedClasses').value = classList.join(',');
      }

      function addCandidate() {
        if (candidateCount >= MAX_CANDIDATES) {
          notifications.warning(`Maximum ${MAX_CANDIDATES} candidates allowed`);
          return;
        }
        candidateCount++;
        const container = document.getElementById('candidates-container');
        const candidateId = Utils.generateId();
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `candidate-${candidateId}`;
        card.style.animation = 'slideUp 0.3s ease';
        card.innerHTML = `
          <div class="card-header">
            <h4>Candidate #${candidateCount}</h4>
            <button type="button" class="btn btn-danger btn-sm" 
                    onclick="removeCandidate('${candidateId}')">🗑️ Remove</button>
          </div>
          <div class="form-group">
            <label class="form-label">Name *</label>
            <input type="text" class="form-input candidate-name" 
                   placeholder="Enter full name" required maxlength="50">
          </div>
          <div class="form-group">
            <label class="form-label">Class *</label>
            <input type="text" class="form-input candidate-class" 
                   placeholder="e.g., 10A" required maxlength="10">
          </div>
          <div class="form-group">
            <label class="form-label">Photo *</label>
            <input type="file" class="form-input candidate-photo-input" 
                   accept="image/*" required>
            <div class="photo-preview" style="margin-top: var(--spacing-sm);"></div>
          </div>
        `;
        container.appendChild(card);
        // Photo preview
        const photoInput = card.querySelector('.candidate-photo-input');
        photoInput.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
              card.querySelector('.photo-preview').innerHTML = `
                <img src="${event.target.result}" 
                     style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary-light);">
              `;
            };
            reader.readAsDataURL(file);
          }
        });
        updateCandidateCount();
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      window.removeCandidate = function(candidateId) {
        if (candidateCount <= MIN_CANDIDATES) {
          notifications.warning(`Minimum ${MIN_CANDIDATES} candidates required`);
          return;
        }
        const card = document.getElementById(`candidate-${candidateId}`);
        if (card) {
          card.style.animation = 'fadeOut 0.3s ease';
          setTimeout(() => {
            card.remove();
            candidateCount--;
            updateCandidateCount();
            renumberCandidates();
          }, 300);
        }
      };

      function renumberCandidates() {
        const cards = document.querySelectorAll('#candidates-container .card');
        cards.forEach((card, index) => {
          card.querySelector('h4').textContent = `Candidate #${index + 1}`;
        });
      }

      function updateCandidateCount() {
        document.getElementById('candidate-count').textContent = `${candidateCount}/${MAX_CANDIDATES}`;
        document.getElementById('add-candidate-btn').disabled = candidateCount >= MAX_CANDIDATES;
      }

      // Live password matching
      document.getElementById('confirmPassword').addEventListener('input', function() {
        const password = document.getElementById('masterPassword').value;
        const hint = document.getElementById('password-match');
        if (this.value === '') {
          hint.style.display = 'none';
        } else if (this.value === password) {
          hint.style.display = 'block';
          hint.style.color = 'var(--success)';
          hint.textContent = '✓ Passwords match';
        } else {
          hint.style.display = 'block';
          hint.style.color = 'var(--danger)';
          hint.textContent = '✕ Passwords do not match';
        }
      });

      // Form submission
      document.getElementById('create-poll-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const postName = document.getElementById('postName').value.trim();
        if (!postName) { notifications.error('Please enter post name'); return; }
        
        const registrationRequired = document.getElementById('registrationToggle').checked;
        if (registrationRequired && classList.length === 0) {
          notifications.error('Please add at least one class (or disable registration)');
          return;
        }
        
        const candidateCards = document.querySelectorAll('#candidates-container .card');
        if (candidateCards.length < MIN_CANDIDATES) {
          notifications.error(`Minimum ${MIN_CANDIDATES} candidates required`);
          return;
        }
        
        const masterPassword = document.getElementById('masterPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (masterPassword.length < 4) {
          notifications.error('Password must be at least 4 characters');
          return;
        }
        if (masterPassword !== confirmPassword) {
          notifications.error('Passwords do not match');
          return;
        }
        
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;
        submitBtn.textContent = 'Creating...';
        submitBtn.disabled = true;
        
        try {
          const candidates = [];
          for (const card of candidateCards) {
            const name = card.querySelector('.candidate-name').value.trim();
            const className = card.querySelector('.candidate-class').value.trim();
            const photoFile = card.querySelector('.candidate-photo-input').files[0];
            if (!name || !className || !photoFile) {
              notifications.error('All candidate fields are required');
              submitBtn.textContent = originalText;
              submitBtn.disabled = false;
              return;
            }
            const photoDataUrl = await Utils.compressImage(photoFile, 200, 200, 0.7);
            candidates.push({
              id: Utils.generateId(),
              name,
              class: className,
              photo: photoDataUrl,
              votes: 0
            });
          }
          
          const passwordHash = await cryptoManager.hashPassword(masterPassword);
          const poll = {
            id: Utils.generateId(),
            postName,
            candidates,
            allowedClasses: registrationRequired ? classList : [],
            registrationRequired,
            masterPasswordHash: passwordHash,
            status: 'pending',
            votedCombos: [],
            createdAt: Date.now(),
            startedAt: null,
            endedAt: null
          };
          
          await db.savePoll(poll);
          notifications.success('Poll created successfully!');
          Utils.playSound('success');
          setTimeout(() => window.location.href = 'index.html', 500);
        } catch (error) {
          console.error('Error creating poll:', error);
          notifications.error('Failed to create poll');
          submitBtn.textContent = originalText;
          submitBtn.disabled = false;
        }
      });

      // Enter key to add class
      document.getElementById('newClass').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          addClass();
        }
      });

      // Expose functions that are called from inline event handlers
      window.addClass = addClass;
      window.toggleRegistration = toggleRegistration;
      window.removeClass = removeClass;
      window.addCandidate = addCandidate;   // <-- crucial for the button onclick
      
      // Initialise with two candidates and correct class visibility
      toggleRegistration();
      addCandidate();
      addCandidate();
    });
  </script>
</body>
</html>
