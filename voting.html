<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <title>Voting - Election Portal</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Status Bar -->
  <div style="background: var(--primary); color: white; padding: 8px 16px; text-align: center; font-size: 0.875rem; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center;">
    <span id="status-bar">🟢 Voting Active</span>
    <span id="vote-count-badge" style="background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 12px; font-size: 0.75rem;">0 votes</span>
  </div>

  <div class="app-container">
    <!-- Initial Verification Modal (only if registration enabled) -->
    <div id="initial-modal" class="modal-overlay">
      <div class="modal-dialog">
        <div class="modal-header">
          <h2>🗳️ Voter Verification</h2>
          <div style="background: var(--success); color: white; padding: 4px 12px; border-radius: var(--radius-full); font-size: 0.8125rem;">Ready</div>
        </div>
        <div class="form-group">
          <label class="form-label" for="rollNumber">Roll Number *</label>
          <input type="number" id="rollNumber" class="form-input" inputmode="numeric" pattern="[0-9]*" 
                 placeholder="Enter numeric roll number" autocomplete="off" autofocus
                 onkeypress="return event.charCode >= 48 && event.charCode <= 57">
        </div>
        <div class="form-group">
          <label class="form-label" for="classSelect">Select Class *</label>
          <select id="classSelect" class="form-select"><option value="">-- Select Class --</option></select>
        </div>
        <div id="already-voted-message" style="display:none; background:#fef3c7; padding:12px; border-radius:var(--radius-lg); margin-bottom:var(--spacing-md);">⚠️ Already voted.</div>
        <button id="proceed-btn" class="btn btn-primary btn-block btn-lg">Proceed to Vote →</button>
        <div style="margin-top:var(--spacing-xl); padding-top:var(--spacing-lg); border-top:2px solid var(--border-color);">
          <button id="end-poll-btn" class="btn btn-outline btn-block" style="color:var(--danger); border-color:var(--danger);">⛔ End Poll (Officer Only)</button>
        </div>
      </div>
    </div>

    <!-- Candidate Selection Modal (shown directly if no registration) -->
    <div id="candidate-modal" class="modal-overlay" style="display:none;">
      <div class="modal-dialog" style="max-width:500px; max-height:85vh; overflow-y:auto;">
        <div class="modal-header">
          <div>
            <h2 id="post-title-display" style="font-size:1.25rem;"></h2>
            <small id="voter-info-display" style="color:var(--text-secondary);"></small>
          </div>
          <button class="modal-close" onclick="backToInitial()">✕</button>
        </div>
        <div id="candidates-list"></div>
        <div style="display:flex; gap:var(--spacing-md); margin-top:var(--spacing-lg);">
          <button class="btn btn-outline" onclick="backToInitial()" style="flex:1;">← Back</button>
          <button id="end-poll-candidate-btn" class="btn btn-outline" style="color:var(--danger); border-color:var(--danger); flex:1;">⛔ End Poll</button>
        </div>
      </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="modal-overlay">
      <div class="modal-dialog" style="max-width:420px;">
        <div style="text-align:center;">
          <div style="font-size:3.5rem; margin-bottom:var(--spacing-sm);">🤔</div>
          <h2 style="font-size:1.5rem;">Confirm Your Vote</h2>
          <p id="confirm-voter-text" style="color:var(--text-secondary);"></p>
          <div id="selected-candidate-preview" style="margin:var(--spacing-lg) 0; padding:var(--spacing-lg); background:var(--bg-tertiary); border-radius:var(--radius-xl);">
            <div style="display:flex; align-items:center; gap:var(--spacing-md);">
              <div style="width:80px; height:80px; border-radius:50%; overflow:hidden; flex-shrink:0; border:3px solid var(--primary-light);">
                <img id="confirm-candidate-photo" src="" alt="" style="width:100%; height:100%; object-fit:cover;">
              </div>
              <div style="text-align:left;">
                <strong id="confirm-candidate-name" style="font-size:1.125rem;"></strong>
                <br><small id="confirm-candidate-class" style="color:var(--text-secondary);"></small>
              </div>
            </div>
          </div>
          <div style="display:flex; gap:var(--spacing-md);">
            <button class="btn btn-outline" onclick="cancelVote()" style="flex:1;">Cancel</button>
            <button class="btn btn-success btn-lg" id="confirm-vote-btn" style="flex:2;">✅ Confirm Vote</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="modal-overlay">
      <div class="modal-dialog" style="text-align:center; max-width:380px;">
        <div style="font-size:4rem; animation:bounceIn 0.5s ease;">✅</div>
        <h2 style="color:var(--success);">Vote Cast Successfully!</h2>
        <p style="color:var(--text-secondary);">Thank you for voting</p>
        <div style="margin-top:var(--spacing-lg);">
          <div class="progress-bar"><div class="progress-fill" id="redirect-progress" style="width:100%;"></div></div>
          <p style="margin-top:var(--spacing-sm); font-size:0.875rem; color:var(--text-secondary);">Next voter in <span id="countdown">3</span>s</p>
        </div>
      </div>
    </div>

    <!-- End Poll Password Modal -->
    <div id="end-password-modal" class="modal-overlay">
      <div class="modal-dialog">
        <div class="modal-header">
          <h2>🔐 End Poll Authentication</h2>
          <button class="modal-close" onclick="closeModal('end-password-modal')">✕</button>
        </div>
        <div class="form-group">
          <label class="form-label">Master Password</label>
          <input type="password" id="end-password" class="form-input" placeholder="Enter master password">
        </div>
        <div style="display:flex; gap:var(--spacing-md); justify-content:flex-end;">
          <button class="btn btn-outline" onclick="closeModal('end-password-modal')">Cancel</button>
          <button class="btn btn-danger" id="confirm-end-btn">End Poll</button>
        </div>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="crypto.js"></script>
  <script src="utils.js"></script>
  <script src="notifications.js"></script>
  <script src="theme.js"></script>
  <script>
    const pollId = Utils.getQueryParam('pollId');
    let currentPoll = null;
    let selectedCandidateId = null;
    let redirectTimer = null;
    let registrationEnabled = false;

    async function init() {
      try {
        currentPoll = await db.getPoll(pollId);
        if (!currentPoll || currentPoll.status !== 'active') {
          document.body.innerHTML = `<div class="app-container"><div class="glass-panel" style="text-align:center;"><h2>No Active Poll</h2><a href="index.html" class="btn btn-primary">Home</a></div></div>`;
          return;
        }
        registrationEnabled = currentPoll.enableRegistration || false;
        updateStatusBar();

        if (registrationEnabled) {
          // Populate class dropdown
          const select = document.getElementById('classSelect');
          select.innerHTML = '<option value="">-- Select Class --</option>' +
            currentPoll.allowedClasses.map(c => `<option value="${c}">${c}</option>`).join('');
          showModal('initial-modal');
          document.getElementById('rollNumber').focus();
        } else {
          // Skip verification, show candidate modal directly
          renderCandidates('', '');
          showModal('candidate-modal');
        }

        document.addEventListener('keydown', handleKeyboard);
      } catch (error) {
        console.error(error);
        notifications.error('Failed to load voting');
      }
    }

    function updateStatusBar() {
      const votedCount = currentPoll.votedCombos ? currentPoll.votedCombos.length : 0;
      document.getElementById('vote-count-badge').textContent = `${votedCount} votes`;
    }

    function handleKeyboard(e) {
      if (e.key === 'Escape') {
        if (document.getElementById('confirm-modal').classList.contains('active')) cancelVote();
        else if (document.getElementById('candidate-modal').classList.contains('active') && registrationEnabled) backToInitial();
      }
    }

    // Proceed button (only if registration enabled)
    document.getElementById('proceed-btn')?.addEventListener('click', async () => {
      if (!registrationEnabled) return;
      const rollNumber = document.getElementById('rollNumber').value.trim();
      const className = document.getElementById('classSelect').value;
      if (!rollNumber) { notifications.warning('Enter roll number'); document.getElementById('rollNumber').focus(); return; }
      if (!/^\d+$/.test(rollNumber)) { notifications.warning('Only numbers allowed'); document.getElementById('rollNumber').focus(); return; }
      if (!className) { notifications.warning('Select class'); return; }
      const combo = `${rollNumber}|${className}`;
      if (currentPoll.votedCombos.includes(combo)) {
        document.getElementById('already-voted-message').style.display = 'block';
        notifications.error('Already voted');
        Utils.playSound('error');
        document.getElementById('rollNumber').value = '';
        document.getElementById('rollNumber').focus();
        setTimeout(() => document.getElementById('already-voted-message').style.display = 'none', 3000);
        return;
      }
      document.getElementById('already-voted-message').style.display = 'none';
      renderCandidates(rollNumber, className);
      closeModal('initial-modal');
      showModal('candidate-modal');
    });

    function renderCandidates(rollNumber, className) {
      document.getElementById('post-title-display').textContent = currentPoll.postName;
      const infoDisplay = document.getElementById('voter-info-display');
      if (registrationEnabled && rollNumber) {
        infoDisplay.textContent = `Voter: ${rollNumber} (${className})`;
      } else {
        infoDisplay.textContent = '';
      }
      const list = document.getElementById('candidates-list');
      list.innerHTML = currentPoll.candidates.map((c, i) => `
        <div class="candidate-vote-card" onclick="selectCandidate('${c.id}', this)" style="animation:slideUp 0.3s ease ${i*0.08}s both;">
          <img src="${c.photo}" alt="${c.name}" style="width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid var(--primary-light);">
          <div style="flex:1;">
            <h3 style="font-size:1.125rem;margin-bottom:2px;">${c.name}</h3>
            <p style="color:var(--text-secondary);margin:0;">Class: ${c.class}</p>
          </div>
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); selectCandidate('${c.id}', this.closest('.candidate-vote-card'))">Vote</button>
        </div>
      `).join('');
    }

    function selectCandidate(candidateId, element) {
      document.querySelectorAll('.candidate-vote-card').forEach(card => card.classList.remove('selected'));
      element.classList.add('selected');
      selectedCandidateId = candidateId;
      Utils.playSound('click');
      const candidate = currentPoll.candidates.find(c => c.id === candidateId);
      if (!candidate) return;
      document.getElementById('confirm-voter-text').textContent = `Are you sure you want to vote for:`;
      document.getElementById('confirm-candidate-photo').src = candidate.photo;
      document.getElementById('confirm-candidate-name').textContent = candidate.name;
      document.getElementById('confirm-candidate-class').textContent = `Class: ${candidate.class}`;
      showModal('confirm-modal');
    }

    function cancelVote() {
      closeModal('confirm-modal');
      selectedCandidateId = null;
      document.querySelectorAll('.candidate-vote-card').forEach(card => card.classList.remove('selected'));
    }

    document.getElementById('confirm-vote-btn').addEventListener('click', async () => {
      if (!selectedCandidateId) return;
      const rollNumber = registrationEnabled ? document.getElementById('rollNumber').value.trim() : '';
      const className = registrationEnabled ? document.getElementById('classSelect').value : '';
      const voterCombo = registrationEnabled ? `${rollNumber}|${className}` : null;

      try {
        if (registrationEnabled && voterCombo) {
          await db.updatePollVote(currentPoll.id, selectedCandidateId, voterCombo);
        } else {
          // Direct vote update without tracking
          currentPoll = await db.getPoll(pollId);
          const candidate = currentPoll.candidates.find(c => c.id === selectedCandidateId);
          if (candidate) candidate.votes++;
          await db.savePoll(currentPoll);
        }

        currentPoll = await db.getPoll(pollId);
        closeModal('confirm-modal');
        closeModal('candidate-modal');
        showSuccessModal();
        updateStatusBar();
        Utils.playSound('success');
      } catch (error) {
        console.error(error);
        notifications.error('Failed to cast vote');
      }
    });

    function showSuccessModal() {
      showModal('success-modal');
      let countdown = 3;
      const countdownEl = document.getElementById('countdown');
      const progress = document.getElementById('redirect-progress');
      countdownEl.textContent = countdown;
      progress.style.width = '100%';
      if (redirectTimer) clearInterval(redirectTimer);
      redirectTimer = setInterval(() => {
        countdown--;
        countdownEl.textContent = countdown;
        progress.style.width = `${(countdown/3)*100}%`;
        if (countdown <= 0) {
          clearInterval(redirectTimer);
          redirectTimer = null;
          resetForNextVoter();
        }
      }, 1000);
    }

    function resetForNextVoter() {
      closeModal('success-modal');
      if (registrationEnabled) {
        document.getElementById('rollNumber').value = '';
        document.getElementById('classSelect').value = '';
        document.getElementById('already-voted-message').style.display = 'none';
        showModal('initial-modal');
        document.getElementById('rollNumber').focus();
      } else {
        // Go back to candidate list directly
        renderCandidates('', '');
        showModal('candidate-modal');
      }
      notifications.info('Ready for next voter');
    }

    function backToInitial() {
      if (registrationEnabled) {
        closeModal('candidate-modal');
        showModal('initial-modal');
        document.getElementById('rollNumber').focus();
      } else {
        // If no registration, "back" could go to candidate modal again (or do nothing)
      }
    }

    // End poll from any screen
    document.getElementById('end-poll-btn')?.addEventListener('click', () => openEndPasswordModal());
    document.getElementById('end-poll-candidate-btn')?.addEventListener('click', () => openEndPasswordModal());

    function openEndPasswordModal() {
      showModal('end-password-modal');
      document.getElementById('end-password').focus();
    }

    document.getElementById('confirm-end-btn').addEventListener('click', async () => {
      const password = document.getElementById('end-password').value;
      if (!password) { notifications.warning('Enter password'); return; }
      const valid = await cryptoManager.verifyPassword(password, currentPoll.masterPasswordHash);
      if (!valid) { notifications.error('Wrong password'); return; }
      currentPoll.status = 'ended';
      currentPoll.endedAt = Date.now();
      await db.savePoll(currentPoll);
      notifications.success('Poll ended');
      Utils.playSound('success');
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    });

    function showModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    window.addEventListener('beforeunload', () => { if (redirectTimer) clearInterval(redirectTimer); });

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay && overlay.id !== 'initial-modal' && overlay.id !== 'candidate-modal') {
          closeModal(overlay.id);
        }
      });
    });

    document.getElementById('end-password')?.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('confirm-end-btn').click();
    });

    init();
  </script>
</body>
</html>
