<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <title>Voting - Election Portal</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Live Status Bar -->
  <div style="background: var(--primary); color: white; padding: 8px; text-align: center; font-size: 0.875rem; position: sticky; top: 0; z-index: 100;">
    <span id="status-bar">🟢 Voting Active</span>
  </div>

  <div class="app-container">
    <!-- Initial Verification Modal -->
    <div id="initial-modal" class="modal-overlay active">
      <div class="modal-dialog">
        <div class="modal-header">
          <h2>🗳️ Voter Verification</h2>
          <div id="voter-queue-badge" style="background: var(--success); color: white; padding: 4px 12px; border-radius: var(--radius-full); font-size: 0.875rem;">
            Next Voter
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="rollNumber">
            Roll Number <span style="color: var(--danger);">*</span>
          </label>
          <input type="text" id="rollNumber" class="form-input form-input-lg" 
                 placeholder="Enter student roll number"
                 autocomplete="off" autofocus>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="classSelect">
            Select Class <span style="color: var(--danger);">*</span>
          </label>
          <select id="classSelect" class="form-select">
            <option value="">-- Select Class --</option>
          </select>
        </div>

        <div id="already-voted-message" style="display: none; background: #fef3c7; padding: 12px; border-radius: var(--radius-md); margin-bottom: var(--spacing-md);">
          ⚠️ This voter has already cast their vote.
        </div>

        <button id="proceed-btn" class="btn btn-primary btn-block btn-lg">
          Proceed to Vote →
        </button>

        <div style="margin-top: var(--spacing-xl); padding-top: var(--spacing-lg); border-top: 2px solid var(--border-color);">
          <button id="end-poll-btn" class="btn btn-outline btn-block" style="color: var(--danger); border-color: var(--danger);">
            ⛔ End Poll (Officer Only)
          </button>
          <p style="text-align: center; font-size: 0.75rem; color: var(--text-secondary); margin-top: var(--spacing-sm);">
            Requires master password
          </p>
        </div>
      </div>
    </div>

    <!-- Candidate Selection Modal -->
    <div id="candidate-modal" class="modal-overlay">
      <div class="modal-dialog" style="max-width: 500px;">
        <div class="modal-header">
          <div>
            <h2 id="post-title-display"></h2>
            <small style="color: var(--text-secondary);">
              Voter: <strong id="voter-info-display"></strong>
            </small>
          </div>
          <button class="modal-close" onclick="backToInitial()">✕</button>
        </div>

        <div id="candidates-list"></div>

        <div style="display: flex; gap: var(--spacing-md); margin-top: var(--spacing-lg);">
          <button class="btn btn-outline" onclick="backToInitial()" style="flex: 1;">
            ← Back
          </button>
        </div>
      </div>
    </div>

    <!-- Vote Confirmation Modal -->
    <div id="confirm-modal" class="modal-overlay">
      <div class="modal-dialog">
        <div style="text-align: center;">
          <div style="font-size: 4rem; margin-bottom: var(--spacing-md);">🤔</div>
          <h2>Confirm Your Vote</h2>
          <p id="confirm-voter-text" style="color: var(--text-secondary); margin-bottom: var(--spacing-lg);"></p>
          
          <div id="selected-candidate-preview" style="margin-bottom: var(--spacing-lg);"></div>
          
          <div style="display: flex; gap: var(--spacing-md);">
            <button class="btn btn-outline" onclick="cancelVote()" style="flex: 1;">
              Cancel
            </button>
            <button class="btn btn-success btn-lg" id="confirm-vote-btn" style="flex: 2;">
              ✅ Confirm Vote
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="modal-overlay">
      <div class="modal-dialog" style="text-align: center;">
        <div style="font-size: 5rem; animation: bounceIn 0.5s ease;">✅</div>
        <h2 style="color: var(--success);">Vote Cast Successfully!</h2>
        <p style="color: var(--text-secondary);">Thank you for voting</p>
        <div style="margin-top: var(--spacing-lg);">
          <div class="progress-bar">
            <div class="progress-fill" id="redirect-progress" style="width: 100%;"></div>
          </div>
          <p style="margin-top: var(--spacing-sm); font-size: 0.875rem; color: var(--text-secondary);">
            Redirecting to next voter in <span id="countdown">3</span> seconds...
          </p>
        </div>
      </div>
    </div>

    <!-- End Poll Password Modal -->
    <div id="end-password-modal" class="modal-overlay">
      <div class="modal-dialog">
        <div class="modal-header">
          <h2>🔐 End Poll Authentication</h2>
          <button class="modal-close" onclick="closeModal('end-password-modal')">✕</button>
        </div>
        <div class="form-group">
          <label class="form-label">Master Password</label>
          <input type="password" id="end-password" class="form-input" 
                 placeholder="Enter master password">
        </div>
        <div style="display: flex; gap: var(--spacing-md); justify-content: flex-end;">
          <button class="btn btn-outline" onclick="closeModal('end-password-modal')">Cancel</button>
          <button class="btn btn-danger" id="confirm-end-btn">End Poll</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/crypto.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/theme.js"></script>
  <script>
    const pollId = Utils.getQueryParam('pollId');
    let currentPoll = null;
    let selectedCandidateId = null;
    let redirectTimer = null;

    async function init() {
      try {
        currentPoll = await db.getPoll(pollId);
        
        if (!currentPoll || currentPoll.status !== 'active') {
          document.body.innerHTML = `
            <div class="app-container">
              <div class="glass-panel" style="text-align: center;">
                <div style="font-size: 5rem;">⚠️</div>
                <h2>No Active Poll</h2>
                <p style="color: var(--text-secondary);">The poll is either not found or not active.</p>
                <a href="index.html" class="btn btn-primary">Return Home</a>
              </div>
            </div>
          `;
          return;
        }

        // Populate class dropdown
        const classSelect = document.getElementById('classSelect');
        classSelect.innerHTML = '<option value="">-- Select Class --</option>' +
          currentPoll.allowedClasses.map(c => `<option value="${c}">${c}</option>`).join('');

        // Focus roll number input
        document.getElementById('rollNumber').focus();

        // Update status bar
        updateStatusBar();

        // Keyboard navigation
        document.addEventListener('keydown', handleKeyboard);
        
      } catch (error) {
        console.error('Error initializing voting:', error);
        notifications.error('Failed to load voting interface');
      }
    }

    function updateStatusBar() {
      const votedCount = currentPoll.votedCombos.length;
      const totalStudents = currentPoll.allowedClasses.length * 60; // Estimate
      document.getElementById('status-bar').innerHTML = 
        `🟢 Voting Active | ✅ ${votedCount} votes cast`;
    }

    function handleKeyboard(e) {
      if (e.key === 'Escape') {
        if (document.getElementById('confirm-modal').classList.contains('active')) {
          cancelVote();
        } else if (document.getElementById('candidate-modal').classList.contains('active')) {
          backToInitial();
        }
      }
    }

    // Proceed to voting
    document.getElementById('proceed-btn').addEventListener('click', async () => {
      const rollNumber = document.getElementById('rollNumber').value.trim();
      const className = document.getElementById('classSelect').value;

      if (!rollNumber) {
        notifications.warning('Please enter roll number');
        document.getElementById('rollNumber').focus();
        return;
      }

      if (!className) {
        notifications.warning('Please select class');
        document.getElementById('classSelect').focus();
        return;
      }

      const voterCombo = `${rollNumber}|${className}`;

      // Check if already voted
      if (currentPoll.votedCombos.includes(voterCombo)) {
        document.getElementById('already-voted-message').style.display = 'block';
        notifications.error('This voter has already cast their vote');
        Utils.playSound('error');
        return;
      }

      document.getElementById('already-voted-message').style.display = 'none';

      // Show candidates
      renderCandidates(rollNumber, className);
      
      closeModal('initial-modal');
      showModal('candidate-modal');
    });

    function renderCandidates(rollNumber, className) {
      document.getElementById('post-title-display').textContent = currentPoll.postName;
      document.getElementById('voter-info-display').textContent = `${rollNumber} (${className})`;

      const candidatesList = document.getElementById('candidates-list');
      
      candidatesList.innerHTML = currentPoll.candidates.map((candidate, index) => `
        <div class="candidate-vote-card" 
             onclick="selectCandidate('${candidate.id}', this)"
             style="animation: slideUp 0.3s ease ${index * 0.1}s both;">
          <img src="${candidate.photo}" class="candidate-photo" 
               alt="${candidate.name}" loading="lazy">
          <div class="candidate-details">
            <h3>${candidate.name}</h3>
            <p style="color: var(--text-secondary);">Class: ${candidate.class}</p>
          </div>
          <div>
            <button class="btn btn-primary" onclick="event.stopPropagation(); selectCandidate('${candidate.id}', this.closest('.candidate-vote-card'))">
              Vote
            </button>
          </div>
        </div>
      `).join('');
    }

    function selectCandidate(candidateId, element) {
      // Remove previous selections
      document.querySelectorAll('.candidate-vote-card').forEach(card => {
        card.classList.remove('selected');
      });
      
      // Select current
      element.classList.add('selected');
      selectedCandidateId = candidateId;
      
      Utils.playSound('click');
      
      // Show confirmation
      const candidate = currentPoll.candidates.find(c => c.id === candidateId);
      document.getElementById('confirm-voter-text').textContent = 
        `Are you sure you want to vote for:`;
      document.getElementById('selected-candidate-preview').innerHTML = `
        <div style="display: flex; align-items: center; gap: var(--spacing-md); justify-content: center;">
          <img src="${candidate.photo}" style="width: 60px; height: 60px; border-radius: 50%;">
          <div>
            <strong>${candidate.name}</strong><br>
            <small>${candidate.class}</small>
          </div>
        </div>
      `;
      
      showModal('confirm-modal');
    }

    function cancelVote() {
      closeModal('confirm-modal');
      selectedCandidateId = null;
      document.querySelectorAll('.candidate-vote-card').forEach(card => {
        card.classList.remove('selected');
      });
    }

    // Confirm vote
    document.getElementById('confirm-vote-btn').addEventListener('click', async () => {
      if (!selectedCandidateId) return;

      const rollNumber = document.getElementById('rollNumber').value.trim();
      const className = document.getElementById('classSelect').value;
      const voterCombo = `${rollNumber}|${className}`;

      try {
        // Update vote count in database
        await db.updatePollVote(currentPoll.id, selectedCandidateId, voterCombo);
        
        // Refresh local poll data
        currentPoll = await db.getPoll(pollId);

        // Close all modals
        closeModal('confirm-modal');
        closeModal('candidate-modal');
        
        // Show success
        showSuccessModal();
        
        // Update status bar
        updateStatusBar();
        
        Utils.playSound('success');
        
      } catch (error) {
        console.error('Error casting vote:', error);
        notifications.error('Failed to cast vote. Please try again.');
      }
    });

    function showSuccessModal() {
      showModal('success-modal');
      
      let countdown = 3;
      const countdownElement = document.getElementById('countdown');
      const progressBar = document.getElementById('redirect-progress');
      
      countdownElement.textContent = countdown;
      progressBar.style.width = '100%';
      
      redirectTimer = setInterval(() => {
        countdown--;
        countdownElement.textContent = countdown;
        progressBar.style.width = `${(countdown / 3) * 100}%`;
        
        if (countdown <= 0) {
          clearInterval(redirectTimer);
          resetForNextVoter();
        }
      }, 1000);
    }

    function resetForNextVoter() {
      closeModal('success-modal');
      document.getElementById('rollNumber').value = '';
      document.getElementById('classSelect').value = '';
      selectedCandidateId = null;
      document.getElementById('already-voted-message').style.display = 'none';
      showModal('initial-modal');
      document.getElementById('rollNumber').focus();
      
      notifications.info('Ready for next voter');
    }

    function backToInitial() {
      closeModal('candidate-modal');
      showModal('initial-modal');
      document.getElementById('rollNumber').focus();
    }

    // End poll functionality
    document.getElementById('end-poll-btn').addEventListener('click', () => {
      showModal('end-password-modal');
      document.getElementById('end-password').focus();
    });

    document.getElementById('confirm-end-btn').addEventListener('click', async () => {
      const password = document.getElementById('end-password').value;
      
      if (!password) {
        notifications.warning('Please enter password');
        return;
      }

      try {
        const isValid = await cryptoManager.verifyPassword(password, currentPoll.masterPasswordHash);
        
        if (!isValid) {
          notifications.error('Incorrect password');
          return;
        }

        currentPoll.status = 'ended';
        currentPoll.endedAt = Date.now();
        await db.savePoll(currentPoll);
        
        notifications.success('Poll ended successfully');
        Utils.playSound('success');
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
        
      } catch (error) {
        console.error('Error ending poll:', error);
        notifications.error('Failed to end poll');
      }
    });

    function showModal(id) {
      document.getElementById(id).classList.add('active');
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (redirectTimer) {
        clearInterval(redirectTimer);
      }
    });

    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay && overlay.id !== 'initial-modal') {
          closeModal(overlay.id);
        }
      });
    });

    // Initialize
    init();
  </script>
</body>
</html>
