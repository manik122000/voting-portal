<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <title>Election Portal - Home</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="glass-panel" style="margin-bottom: var(--spacing-xl); text-align: center;">
      <div style="font-size: 4rem; margin-bottom: var(--spacing-md);">🗳️</div>
      <h1 style="background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
        Election Portal
      </h1>
      <p style="color: var(--text-secondary);">Secure • Offline • Reliable</p>
      <a href="create.html" class="btn btn-primary btn-lg" style="margin-top: var(--spacing-lg);">
        <span>➕</span> Create New Poll
      </a>
    </header>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-lg);">
      <h2 style="margin: 0;">Active Polls</h2>
      <button onclick="refreshPolls()" class="btn btn-sm btn-outline" title="Refresh">🔄</button>
    </div>

    <div id="polls-container">
      <div class="skeleton" style="height: 120px; margin-bottom: var(--spacing-md);"></div>
      <div class="skeleton" style="height: 120px; margin-bottom: var(--spacing-md);"></div>
    </div>

    <div id="empty-state" style="display: none; text-align: center; padding: var(--spacing-xl);">
      <div style="font-size: 5rem;">📋</div>
      <h3>No Polls Yet</h3>
      <p style="color: var(--text-secondary);">Create your first election poll to get started.</p>
    </div>

    <div id="stats-section" style="margin-top: var(--spacing-xl); display: none;">
      <div class="glass-panel">
        <h3>📊 Quick Stats</h3>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--spacing-md); text-align: center;">
          <div>
            <div style="font-size: 2rem; font-weight: 800;" id="stat-total">0</div>
            <small style="color: var(--text-secondary);">Total Polls</small>
          </div>
          <div>
            <div style="font-size: 2rem; font-weight: 800; color: var(--success);" id="stat-active">0</div>
            <small style="color: var(--text-secondary);">Active</small>
          </div>
          <div>
            <div style="font-size: 2rem; font-weight: 800; color: var(--warning);" id="stat-ended">0</div>
            <small style="color: var(--text-secondary);">Ended</small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Password Modal (for Start / Result / Delete) -->
  <div id="password-modal" class="modal-overlay">
    <div class="modal-dialog">
      <div class="modal-header">
        <h3 id="password-modal-title">🔐 Authentication Required</h3>
        <button class="modal-close" onclick="closeModal('password-modal')">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label" for="master-password">Master Password</label>
        <input type="password" id="master-password" class="form-input" 
               placeholder="Enter master password" autocomplete="off"
               onkeypress="if(event.key==='Enter') confirmAction()">
      </div>
      <div style="display: flex; gap: var(--spacing-md); justify-content: flex-end;">
        <button class="btn btn-outline" onclick="closeModal('password-modal')">Cancel</button>
        <button class="btn btn-primary" id="confirm-password-btn">Confirm</button>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="crypto.js"></script>
  <script src="utils.js"></script>
  <script src="notifications.js"></script>
  <script src="theme.js"></script>
  <script>
    let currentAction = null; // { pollId, type: 'start' | 'result' | 'delete' }

    async function loadPolls() {
      try {
        const polls = await db.getPolls();
        const container = document.getElementById('polls-container');
        const emptyState = document.getElementById('empty-state');
        const statsSection = document.getElementById('stats-section');

        if (!polls || polls.length === 0) {
          container.innerHTML = '';
          emptyState.style.display = 'block';
          statsSection.style.display = 'none';
          return;
        }

        emptyState.style.display = 'none';
        statsSection.style.display = 'block';

        const sortedPolls = polls.sort((a, b) => {
          const order = { active: 0, pending: 1, ended: 2 };
          return order[a.status] - order[b.status];
        });

        document.getElementById('stat-total').textContent = polls.length;
        document.getElementById('stat-active').textContent = polls.filter(p => p.status === 'active').length;
        document.getElementById('stat-ended').textContent = polls.filter(p => p.status === 'ended').length;

        container.innerHTML = sortedPolls.map(poll => {
          const statusBadge = `<span class="badge badge-${poll.status}">${poll.status}</span>`;
          const candidateCount = poll.candidates?.length || 0;
          const voterCount = poll.votedCombos?.length || 0;
          const registrationEnabled = poll.enableRegistration ? '🔒 Reg. ON' : '🔓 Open';

          let actionButtons = '';
          if (poll.status === 'pending') {
            actionButtons = `
              <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); openActionModal('${poll.id}','start')">▶️ Start</button>
              <button class="btn btn-outline btn-sm" style="color: var(--danger);" onclick="event.stopPropagation(); openActionModal('${poll.id}','delete')">🗑️ Delete</button>
            `;
          } else if (poll.status === 'active') {
            actionButtons = `
              <button class="btn btn-success btn-sm" onclick="event.stopPropagation(); openVoting('${poll.id}')">🗳️ Voting</button>
            `;
          } else if (poll.status === 'ended') {
            actionButtons = `
              <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); openResults('${poll.id}')">📊 Results</button>
              <button class="btn btn-outline btn-sm" style="color: var(--danger);" onclick="event.stopPropagation(); openActionModal('${poll.id}','delete')">🗑️ Delete</button>
            `;
          }

          return `
            <div class="card" style="cursor: pointer;">
              <div class="card-header">
                <div>
                  <h3 style="margin:0;">${escapeHtml(poll.postName)}</h3>
                  ${statusBadge}
                </div>
                <div style="font-size:0.75rem; color: var(--text-secondary);">${registrationEnabled}</div>
              </div>
              <div style="margin-bottom:8px; color: var(--text-secondary);">
                👥 ${candidateCount} | ✅ ${voterCount} votes
              </div>
              <div style="display:flex; gap:8px; flex-wrap:wrap;">
                ${actionButtons}
              </div>
            </div>
          `;
        }).join('');
      } catch (error) {
        console.error(error);
        notifications.error('Failed to load polls');
      }
    }

    function openVoting(pollId) {
      window.location.href = `voting.html?pollId=${pollId}`;
    }

    function openResults(pollId) {
      window.location.href = `results.html?pollId=${pollId}`;
    }

    function openActionModal(pollId, type) {
      currentAction = { pollId, type };
      document.getElementById('master-password').value = '';
      document.getElementById('password-modal-title').textContent = 
        type === 'start' ? '🔐 Start Poll' : 
        type === 'delete' ? '🔐 Delete Poll' : '🔐 View Results';
      showModal('password-modal');
      document.getElementById('master-password').focus();
    }

    async function confirmAction() {
      const password = document.getElementById('master-password').value;
      if (!password) { notifications.warning('Enter password'); return; }
      try {
        const poll = await db.getPoll(currentAction.pollId);
        if (!poll) { notifications.error('Poll not found'); return; }
        const valid = await cryptoManager.verifyPassword(password, poll.masterPasswordHash);
        if (!valid) {
          notifications.error('Incorrect password');
          document.getElementById('master-password').classList.add('form-error');
          setTimeout(() => document.getElementById('master-password').classList.remove('form-error'), 1000);
          return;
        }
        closeModal('password-modal');
        if (currentAction.type === 'start') await handleStartPoll(poll);
        else if (currentAction.type === 'result') openResults(poll.id);
        else if (currentAction.type === 'delete') await handleDeletePoll(poll);
      } catch (error) {
        console.error(error);
        notifications.error('Error');
      }
    }

    async function handleStartPoll(poll) {
      const allPolls = await db.getPolls();
      if (allPolls.some(p => p.status === 'active' && p.id !== poll.id)) {
        notifications.warning('Another poll is active. End it first.');
        return;
      }
      poll.status = 'active';
      poll.startedAt = Date.now();
      await db.savePoll(poll);
      notifications.success(`Poll "${poll.postName}" started!`);
      Utils.playSound('success');
      loadPolls();
    }

    async function handleDeletePoll(poll) {
      if (!confirm(`Delete poll "${poll.postName}" permanently? This cannot be undone.`)) return;
      await db.deletePoll(poll.id);
      notifications.success('Poll deleted');
      loadPolls();
    }

    function showModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    async function refreshPolls() {
      db.clearCache();
      await loadPolls();
      notifications.info('Refreshed');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.getElementById('confirm-password-btn').addEventListener('click', confirmAction);

    document.getElementById('password-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal('password-modal');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal('password-modal');
    });

    setInterval(refreshPolls, 30000);
    loadPolls();
  </script>
</body>
</html>
