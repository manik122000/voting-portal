<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <title>Voting - Election Portal</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Numeric input without spinners */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body>
  <!-- Live Status Bar -->
  <div style="background: var(--primary); color: white; padding: 8px 16px; text-align: center; font-size: 0.875rem; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center;">
    <span id="status-bar">🟢 Voting Active</span>
    <span id="vote-count-badge" style="background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 12px; font-size: 0.75rem;">0 votes</span>
  </div>

  <div class="app-container">
    <!-- Initial Verification Modal (only if registration required) -->
    <div id="initial-modal" class="modal-overlay active">
      <div class="modal-dialog">
        <div class="modal-header">
          <h2>🗳️ Voter Verification</h2>
          <div id="voter-queue-badge" style="background: var(--success); color: white; padding: 4px 12px; border-radius: var(--radius-full); font-size: 0.8125rem; font-weight: 600;">Ready</div>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="rollNumber">
            Roll Number <span style="color: var(--danger);">*</span>
          </label>
          <input type="number" id="rollNumber" class="form-input" 
                 placeholder="Enter numeric roll number" inputmode="numeric" pattern="[0-9]*"
                 autocomplete="off" autofocus
                 style="font-size: 1.125rem; padding: 1rem;">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="classSelect">
            Select Class <span style="color: var(--danger);">*</span>
          </label>
          <select id="classSelect" class="form-select" style="font-size: 1.125rem; padding: 1rem;">
            <option value="">-- Select Class --</option>
          </select>
        </div>

        <div id="already-voted-message" style="display: none; background: #fef3c7; padding: 12px; border-radius: var(--radius-lg); margin-bottom: var(--spacing-md); animation: slideUp 0.3s ease;">
          ⚠️ This voter has already cast their vote.
        </div>

        <button id="proceed-btn" class="btn btn-primary btn-block btn-lg">
          Proceed to Vote →
        </button>

        <div style="margin-top: var(--spacing-xl); padding-top: var(--spacing-lg); border-top: 2px solid var(--border-color);">
          <button id="end-poll-btn" class="btn btn-outline btn-block" style="color: var(--danger); border-color: var(--danger);">
            ⛔ End Poll (Officer Only)
          </button>
          <p style="text-align: center; font-size: 0.75rem; color: var(--text-secondary); margin-top: var(--spacing-sm);">
            Requires master password
          </p>
        </div>
      </div>
    </div>

    <!-- Candidate Selection Modal -->
    <div id="candidate-modal" class="modal-overlay">
      <div class="modal-dialog" style="max-width: 500px; max-height: 85vh; overflow-y: auto;">
        <div class="modal-header">
          <div>
            <h2 id="post-title-display" style="font-size: 1.25rem;"></h2>
            <small id="voter-info-display" style="color: var(--text-secondary);"></small>
          </div>
          <button class="modal-close" onclick="backToInitial()">✕</button>
        </div>
        <div id="candidates-list"></div>
      </div>
    </div>

    <!-- Vote Confirmation Modal -->
    <div id="confirm-modal" class="modal-overlay">
      <div class="modal-dialog" style="max-width: 420px;">
        <div style="text-align: center;">
          <div style="font-size: 3.5rem; margin-bottom: var(--spacing-sm);">🤔</div>
          <h2 style="font-size: 1.5rem; margin-bottom: var(--spacing-sm);">Confirm Your Vote</h2>
          <p id="confirm-voter-text" style="color: var(--text-secondary); margin-bottom: var(--spacing-md); font-size: 0.9375rem;"></p>
          <div id="selected-candidate-preview" style="margin: var(--spacing-lg) 0; padding: var(--spacing-lg); background: var(--bg-tertiary); border-radius: var(--radius-xl);">
            <div style="display: flex; align-items: center; gap: var(--spacing-md);">
              <div style="width: 80px; height: 80px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 3px solid var(--primary-light);">
                <img id="confirm-candidate-photo" src="" alt="" style="width: 100%; height: 100%; object-fit: cover; display: block;">
              </div>
              <div style="text-align: left;">
                <strong id="confirm-candidate-name" style="font-size: 1.125rem;"></strong><br>
                <small id="confirm-candidate-class" style="color: var(--text-secondary);"></small>
              </div>
            </div>
          </div>
          <div style="display: flex; gap: var(--spacing-md); margin-top: var(--spacing-lg);">
            <button class="btn btn-outline" onclick="cancelVote()" style="flex: 1;">Cancel</button>
            <button class="btn btn-success btn-lg" id="confirm-vote-btn" style="flex: 2;">✅ Confirm Vote</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="modal-overlay">
      <div class="modal-dialog" style="text-align: center; max-width: 380px;">
        <div style="font-size: 4rem; animation: bounceIn 0.5s ease;">✅</div>
        <h2 style="color: var(--success); font-size: 1.5rem;">Vote Cast Successfully!</h2>
        <p style="color: var(--text-secondary); font-size: 0.9375rem;">Thank you for voting</p>
        <div style="margin-top: var(--spacing-lg);">
          <div class="progress-bar">
            <div class="progress-fill" id="redirect-progress" style="width: 100%; transition: width 1s linear;"></div>
          </div>
          <p style="margin-top: var(--spacing-sm); font-size: 0.875rem; color: var(--text-secondary);">
            Next voter in <span id="countdown" style="font-weight: 700;">3</span>s
          </p>
        </div>
      </div>
    </div>

    <!-- End Poll Password Modal -->
    <div id="end-password-modal" class="modal-overlay">
      <div class="modal-dialog">
        <div class="modal-header">
          <h2 style="font-size: 1.25rem;">🔐 End Poll Authentication</h2>
          <button class="modal-close" onclick="closeModal('end-password-modal')">✕</button>
        </div>
        <div class="form-group">
          <label class="form-label">Master Password</label>
          <input type="password" id="end-password" class="form-input" 
                 placeholder="Enter master password" autocomplete="off">
        </div>
        <div style="display: flex; gap: var(--spacing-md); justify-content: flex-end;">
          <button class="btn btn-outline" onclick="closeModal('end-password-modal')">Cancel</button>
          <button class="btn btn-danger" id="confirm-end-btn">End Poll</button>
        </div>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="crypto.js"></script>
  <script src="utils.js"></script>
  <script src="notifications.js"></script>
  <script src="theme.js"></script>
  <script>
    const pollId = Utils.getQueryParam('pollId');
    let currentPoll = null;
    let selectedCandidateId = null;
    let redirectTimer = null;

    async function init() {
      try {
        currentPoll = await db.getPoll(pollId);
        if (!currentPoll || currentPoll.status !== 'active') {
          document.body.innerHTML = `
            <div class="app-container">
              <div class="glass-panel" style="text-align: center;">
                <div style="font-size: 5rem;">⚠️</div>
                <h2>No Active Poll</h2>
                <p style="color: var(--text-secondary);">The poll is either not found or not active.</p>
                <a href="index.html" class="btn btn-primary">Return Home</a>
              </div>
            </div>`;
          return;
        }

        if (currentPoll.registrationRequired) {
          // Populate class dropdown
          const classSelect = document.getElementById('classSelect');
          classSelect.innerHTML = '<option value="">-- Select Class --</option>' +
            currentPoll.allowedClasses.map(c => `<option value="${c}">${c}</option>`).join('');
          document.getElementById('initial-modal').classList.add('active');
        } else {
          // Skip verification, directly show candidates
          document.getElementById('initial-modal').classList.remove('active');
          showCandidatesModal();
        }

        updateStatusBar();
        document.addEventListener('keydown', handleKeyboard);
      } catch (error) {
        console.error('Error initializing voting:', error);
        notifications.error('Failed to load voting interface');
      }
    }

    function updateStatusBar() {
      const votedCount = currentPoll.votedCombos.length;
      document.getElementById('status-bar').textContent = '🟢 Voting Active';
      document.getElementById('vote-count-badge').textContent = `${votedCount} votes`;
    }

    function handleKeyboard(e) {
      if (e.key === 'Escape') {
        if (document.getElementById('confirm-modal').classList.contains('active')) cancelVote();
        else if (document.getElementById('candidate-modal').classList.contains('active')) backToInitial();
        else if (document.getElementById('end-password-modal').classList.contains('active')) closeModal('end-password-modal');
      }
    }

    // Proceed button for registration flow
    document.getElementById('proceed-btn').addEventListener('click', async () => {
      const rollNumber = document.getElementById('rollNumber').value.trim();
      const className = document.getElementById('classSelect').value;

      if (!rollNumber) {
        notifications.warning('Please enter roll number');
        document.getElementById('rollNumber').focus();
        return;
      }
      if (!className) {
        notifications.warning('Please select class');
        return;
      }

      const voterCombo = `${rollNumber}|${className}`;
      if (currentPoll.votedCombos.includes(voterCombo)) {
        document.getElementById('already-voted-message').style.display = 'block';
        notifications.error('This voter has already cast their vote');
        Utils.playSound('error');
        document.getElementById('rollNumber').value = '';
        document.getElementById('rollNumber').focus();
        setTimeout(() => document.getElementById('already-voted-message').style.display = 'none', 3000);
        return;
      }

      document.getElementById('already-voted-message').style.display = 'none';
      showCandidatesModal(rollNumber, className);
    });

    function showCandidatesModal(rollNumber = '', className = '') {
      document.getElementById('post-title-display').textContent = currentPoll.postName;
      document.getElementById('voter-info-display').textContent = 
        currentPoll.registrationRequired ? `${rollNumber} (${className})` : 'Open voting';
      
      const list = document.getElementById('candidates-list');
      list.innerHTML = currentPoll.candidates.map((candidate, index) => `
        <div class="candidate-vote-card" 
             onclick="selectCandidate('${candidate.id}', this)"
             style="animation: slideUp 0.3s ease ${index * 0.08}s both;">
          <img src="${candidate.photo}" alt="${candidate.name}" loading="lazy"
               style="width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary-light);">
          <div class="candidate-details" style="flex:1;">
            <h3 style="font-size: 1.125rem; margin-bottom: 2px;">${candidate.name}</h3>
            <p style="color: var(--text-secondary); margin:0; font-size:0.875rem;">Class: ${candidate.class}</p>
          </div>
          <div>
            <button class="btn btn-primary btn-sm" 
                    onclick="event.stopPropagation(); selectCandidate('${candidate.id}', this.closest('.candidate-vote-card'))"
                    style="padding: 8px 20px;">Vote</button>
          </div>
        </div>
      `).join('');

      closeModal('initial-modal');
      showModal('candidate-modal');
    }

    function selectCandidate(candidateId, element) {
      document.querySelectorAll('.candidate-vote-card').forEach(c => c.classList.remove('selected'));
      element.classList.add('selected');
      selectedCandidateId = candidateId;
      Utils.playSound('click');

      const candidate = currentPoll.candidates.find(c => c.id === candidateId);
      document.getElementById('confirm-voter-text').textContent = `Are you sure you want to vote for:`;
      document.getElementById('confirm-candidate-photo').src = candidate.photo;
      document.getElementById('confirm-candidate-name').textContent = candidate.name;
      document.getElementById('confirm-candidate-class').textContent = `Class: ${candidate.class}`;
      showModal('confirm-modal');
    }

    function cancelVote() {
      closeModal('confirm-modal');
      selectedCandidateId = null;
      document.querySelectorAll('.candidate-vote-card').forEach(c => c.classList.remove('selected'));
    }

    document.getElementById('confirm-vote-btn').addEventListener('click', async () => {
      if (!selectedCandidateId) return;
      
      const rollNumber = document.getElementById('rollNumber')?.value.trim() || '';
      const className = document.getElementById('classSelect')?.value || '';
      const voterCombo = currentPoll.registrationRequired ? `${rollNumber}|${className}` : null;

      try {
        if (currentPoll.registrationRequired && voterCombo) {
          await db.updatePollVote(currentPoll.id, selectedCandidateId, voterCombo);
        } else {
          // Open voting: just increment candidate votes without combo
          const poll = await db.getPoll(pollId);
          const candidate = poll.candidates.find(c => c.id === selectedCandidateId);
          if (candidate) candidate.votes++;
          await db.savePoll(poll);
        }
        
        currentPoll = await db.getPoll(pollId);
        closeModal('confirm-modal');
        closeModal('candidate-modal');
        showSuccessModal();
        updateStatusBar();
        Utils.playSound('success');
      } catch (error) {
        console.error('Error casting vote:', error);
        notifications.error('Failed to cast vote. Please try again.');
      }
    });

    function showSuccessModal() {
      showModal('success-modal');
      let countdown = 3;
      const countdownEl = document.getElementById('countdown');
      const progress = document.getElementById('redirect-progress');
      countdownEl.textContent = countdown;
      progress.style.width = '100%';
      if (redirectTimer) clearInterval(redirectTimer);
      redirectTimer = setInterval(() => {
        countdown--;
        countdownEl.textContent = countdown;
        progress.style.width = `${(countdown/3)*100}%`;
        if (countdown <= 0) {
          clearInterval(redirectTimer);
          redirectTimer = null;
          resetForNextVoter();
        }
      }, 1000);
    }

    function resetForNextVoter() {
      closeModal('success-modal');
      selectedCandidateId = null;
      if (currentPoll.registrationRequired) {
        document.getElementById('rollNumber').value = '';
        document.getElementById('classSelect').value = '';
        document.getElementById('already-voted-message').style.display = 'none';
        showModal('initial-modal');
        document.getElementById('rollNumber').focus();
      } else {
        showCandidatesModal();  // directly back to candidate selection
      }
      notifications.info('Ready for next voter');
    }

    function backToInitial() {
      closeModal('candidate-modal');
      if (currentPoll.registrationRequired) {
        showModal('initial-modal');
        document.getElementById('rollNumber').focus();
      } else {
        // If open voting, just close candidate modal (or show nothing extra)
        // but we need a way to go back? Actually we can stay on candidate modal,
        // so this function might not be called. We'll hide candidate modal if back pressed.
      }
    }

    // End poll
    document.getElementById('end-poll-btn').addEventListener('click', () => {
      showModal('end-password-modal');
      setTimeout(() => document.getElementById('end-password').focus(), 100);
    });

    document.getElementById('confirm-end-btn').addEventListener('click', async () => {
      const password = document.getElementById('end-password').value;
      if (!password) { notifications.warning('Enter password'); return; }
      const valid = await cryptoManager.verifyPassword(password, currentPoll.masterPasswordHash);
      if (!valid) {
        notifications.error('Incorrect password');
        return;
      }
      currentPoll.status = 'ended';
      currentPoll.endedAt = Date.now();
      await db.savePoll(currentPoll);
      notifications.success('Poll ended');
      Utils.playSound('success');
      setTimeout(() => window.location.href = 'index.html', 800);
    });

    function showModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    window.addEventListener('beforeunload', () => { if (redirectTimer) clearInterval(redirectTimer); });

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay && overlay.id !== 'initial-modal') closeModal(overlay.id);
      });
    });

    init();
  </script>
</body>
</html>
