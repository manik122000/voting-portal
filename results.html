<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <title>Results - Election Portal</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <style>
    .winner-mini-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: white;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
    }
    .winner-mini-card .winner-photo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 3px solid white;
    }
    .winner-mini-card .winner-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .candidate-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      margin-bottom: 8px;
    }
    .candidate-row .rank-badge {
      font-size: 1.5rem;
      font-weight: 700;
      min-width: 36px;
      text-align: center;
    }
    .candidate-row .photo-cell {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid var(--primary-light);
    }
    .candidate-row .photo-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .no-majority-banner {
      text-align: center;
      padding: 24px;
      background: var(--bg-secondary);
      border: 2px dashed var(--border-color);
      border-radius: 16px;
      margin-bottom: 20px;
    }
    .tied-photo {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--primary-light);
    }
    .tied-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header style="display: flex; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-xl);">
      <a href="index.html" class="btn btn-outline btn-icon" title="Back">←</a>
      <h1 style="margin: 0; font-size: 1.5rem;">📊 Election Results</h1>
    </header>

    <div id="results-container">
      <div class="skeleton" style="height: 100px; margin-bottom: var(--spacing-md);"></div>
      <div class="skeleton" style="height: 200px; margin-bottom: var(--spacing-md);"></div>
    </div>

    <div id="error-state" style="display: none; text-align: center; padding: var(--spacing-xl);">
      <div style="font-size: 5rem;">🔒</div>
      <h2>Results Not Available</h2>
      <p style="color: var(--text-secondary);">The poll has not ended yet or is not found.</p>
      <a href="index.html" class="btn btn-primary">Return Home</a>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="crypto.js"></script>
  <script src="utils.js"></script>
  <script src="notifications.js"></script>
  <script src="theme.js"></script>
  <script>
    const pollId = Utils.getQueryParam('pollId');
    let poll = null;

    async function loadResults() {
      try {
        poll = await db.getPoll(pollId);
        if (!poll || poll.status !== 'ended') {
          document.getElementById('results-container').style.display = 'none';
          document.getElementById('error-state').style.display = 'block';
          return;
        }
        renderResults();
      } catch (error) {
        console.error(error);
        notifications.error('Failed to load results');
      }
    }

    function renderResults() {
      const container = document.getElementById('results-container');
      const candidates = poll.candidates;
      const totalVotes = candidates.reduce((s, c) => s + c.votes, 0);
      const maxVotes = Math.max(...candidates.map(c => c.votes));
      const winners = candidates.filter(c => c.votes === maxVotes);
      const sorted = [...candidates].sort((a, b) => b.votes - a.votes);

      let winnerHTML = '';
      if (winners.length === 1 && maxVotes > 0) {
        winnerHTML = `
          <div class="winner-mini-card">
            <div class="winner-photo">
              <img src="${winners[0].photo}" alt="${winners[0].name}">
            </div>
            <div style="flex:1;">
              <div style="font-size:0.875rem; opacity:0.9;">🏆 WINNER</div>
              <h2 style="margin:2px 0; font-size:1.25rem;">${winners[0].name}</h2>
              <div style="font-size:0.875rem; opacity:0.9;">Class: ${winners[0].class}</div>
            </div>
            <div style="text-align:center;">
              <div style="font-size:2rem; font-weight:800;">${winners[0].votes}</div>
              <div style="font-size:0.75rem;">votes</div>
              <div style="font-size:0.75rem;">${totalVotes ? ((winners[0].votes/totalVotes)*100).toFixed(1) : 0}%</div>
            </div>
          </div>`;
      } else if (winners.length > 1 && maxVotes > 0) {
        winnerHTML = `
          <div class="no-majority-banner">
            <div style="font-size:3rem;">🤝</div>
            <h3>No Clear Majority</h3>
            <p>${winners.length} candidates tied with ${maxVotes} votes each.</p>
            <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:12px;">
              ${winners.map(w => `
                <div style="text-align:center;">
                  <div class="tied-photo"><img src="${w.photo}" alt="${w.name}"></div>
                  <div style="font-weight:600; font-size:0.875rem;">${w.name}</div>
                  <div style="font-size:0.75rem; color:var(--text-secondary);">${w.class}</div>
                </div>`).join('')}
            </div>
          </div>`;
      } else {
        winnerHTML = `
          <div class="no-majority-banner">
            <div style="font-size:3rem;">📭</div>
            <h3>No Votes Cast</h3>
            <p>No one voted in this election.</p>
          </div>`;
      }

      const rankingsHTML = sorted.map((c, i) => {
        const pct = totalVotes ? ((c.votes/totalVotes)*100).toFixed(1) : 0;
        const isWinner = winners.includes(c);
        return `
          <div class="candidate-row" style="${isWinner ? 'border-left: 3px solid var(--warning);' : ''}">
            <div class="rank-badge">${i===0 && isWinner ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`}</div>
            <div class="photo-cell">
              <img src="${c.photo}" alt="${c.name}" loading="lazy">
            </div>
            <div style="flex:1; min-width:0;">
              <div style="font-weight:600; font-size:0.9375rem;">${c.name} ${isWinner && winners.length===1 ? '🏆' : ''}</div>
              <div style="font-size:0.8125rem; color:var(--text-secondary);">Class: ${c.class}</div>
              <div class="progress-bar" style="height:6px; margin-top:4px;">
                <div class="progress-fill" style="width:${pct}%; ${isWinner ? 'background:linear-gradient(90deg,#fbbf24,#f59e0b);' : ''}"></div>
              </div>
            </div>
            <div style="text-align:right; flex-shrink:0;">
              <div style="font-weight:700; font-size:1.25rem;">${c.votes}</div>
              <div style="font-size:0.75rem; color:var(--text-secondary);">${pct}%</div>
            </div>
          </div>`;
      }).join('');

      // Class‑wise turnout
      const classTurnout = {};
      poll.allowedClasses.forEach(cls => classTurnout[cls] = 0);
      poll.votedCombos.forEach(combo => {
        const cls = combo.split('|')[1];
        if (classTurnout.hasOwnProperty(cls)) classTurnout[cls]++;
      });
      const turnoutRows = Object.entries(classTurnout).sort(([,a],[,b]) => b-a).map(([cls, cnt]) => {
        const pct = poll.votedCombos.length ? ((cnt/poll.votedCombos.length)*100).toFixed(1) : 0;
        return `<tr>
          <td><strong>${cls}</strong></td>
          <td>${cnt}</td>
          <td>${pct}%</td>
          <td><div class="progress-bar" style="height:6px;"><div class="progress-fill" style="width:${pct}%;"></div></div></td>
        </tr>`;
      }).join('');

      container.innerHTML = `
        ${winnerHTML}
        <h3 style="margin-bottom:12px;">📋 Rankings</h3>
        ${rankingsHTML}
        <div class="glass-panel" style="margin-top:24px;">
          <h3>👥 Class‑wise Voter Turnout</h3>
          <div style="overflow-x:auto;">
            <table style="width:100%; border-collapse:collapse;">
              <thead><tr style="border-bottom:2px solid var(--border-color);">
                <th style="text-align:left; padding:8px;">Class</th>
                <th style="text-align:center; padding:8px;">Voters</th>
                <th style="text-align:center; padding:8px;">%</th>
                <th style="text-align:left; padding:8px; width:40%;">Distribution</th>
              </tr></thead>
              <tbody>${turnoutRows}</tbody>
              <tfoot><tr style="font-weight:bold; background:var(--bg-tertiary); border-top:2px solid var(--border-color);">
                <td>Total</td><td style="text-align:center;">${poll.votedCombos.length}</td><td style="text-align:center;">100%</td><td></td>
              </tr></tfoot>
            </table>
          </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:20px;">
          <button class="btn btn-primary" onclick="downloadPDF()">📥 PDF</button>
          <button class="btn btn-outline" onclick="downloadCSV()">📊 CSV</button>
        </div>
        <button class="btn btn-outline btn-block" onclick="window.print()" style="margin-top:8px;">🖨️ Print</button>
        <div style="text-align:center; font-size:0.8125rem; color:var(--text-secondary); margin-top:16px;">
          Created: ${Utils.formatDate(poll.createdAt)}<br>
          ${poll.endedAt ? `Ended: ${Utils.formatDate(poll.endedAt)}` : ''}
        </div>`;
    }

    // PDF & CSV download functions unchanged (keep them)
    function downloadPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(18);
      doc.setTextColor(99,102,241);
      doc.text('Election Results', 105, 15, { align:'center' });
      doc.setFontSize(14);
      doc.setTextColor(0,0,0);
      doc.text(poll.postName, 105, 23, { align:'center' });
      // … rest of PDF generation (same as before) …
      // For brevity, I'm omitting the full PDF code; it's unchanged.
    }

    function downloadCSV() {
      // … unchanged …
    }

    loadResults();
  </script>
</body>
</html>
